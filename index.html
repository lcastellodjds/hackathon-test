<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Palette Drop</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    #gate {
      position: fixed;
      inset: 0;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 999;
      padding: 1.5rem;
    }

    #gate.hidden {
      display: none;
    }

    .gate-box {
      width: 100%;
      max-width: 360px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 2.25rem 2rem;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }

    .gate-title {
      font-size: 1.15rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: var(--text);
    }

    .gate-subtitle {
      font-size: 0.85rem;
      color: var(--muted);
      margin-top: 0.2rem;
    }

    .gate-input-wrap {
      position: relative;
    }

    #passwordInput {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: 'Space Mono', monospace;
      font-size: 0.9rem;
      padding: 0.75rem 2.75rem 0.75rem 1rem;
      outline: none;
      transition: border-color 0.15s ease;
      letter-spacing: 0.05em;
    }

    #passwordInput:focus {
      border-color: rgba(255,255,255,0.25);
    }

    #passwordInput.error {
      border-color: rgba(255,80,80,0.6);
    }

    .toggle-visibility {
      position: absolute;
      right: 0.75rem;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--muted);
      font-size: 1rem;
      padding: 2px;
      line-height: 1;
      transition: color 0.15s ease;
    }

    .toggle-visibility:hover {
      color: var(--text);
    }

    .gate-error {
      font-size: 0.82rem;
      color: rgba(255,100,100,0.9);
      min-height: 1.1em;
      transition: opacity 0.2s ease;
    }

    .gate-submit {
      width: 100%;
      background: var(--btn-bg);
      color: var(--btn-text);
      border: none;
      border-radius: 999px;
      padding: 0.8rem;
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: -0.01em;
      transition: transform 0.15s ease, opacity 0.15s ease;
    }

    .gate-submit:hover { opacity: 0.9; transform: scale(1.02); }
    .gate-submit:active { transform: scale(0.97); }

    :root {
      --bg: #0d0d0d;
      --surface: #1a1a1a;
      --border: rgba(255,255,255,0.08);
      --text: #f0f0f0;
      --muted: rgba(255,255,255,0.4);
      --radius: 16px;
      --btn-bg: #f0f0f0;
      --btn-text: #0d0d0d;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
      gap: 3rem;
    }

    header {
      text-align: center;
    }

    header h1 {
      font-size: clamp(2rem, 6vw, 3.5rem);
      font-weight: 600;
      letter-spacing: -0.03em;
      line-height: 1.1;
    }

    header p {
      margin-top: 0.6rem;
      color: var(--muted);
      font-size: 0.95rem;
      letter-spacing: 0.01em;
    }

    .palette {
      display: flex;
      width: min(900px, 100%);
      border-radius: var(--radius);
      overflow: hidden;
      border: 1px solid var(--border);
      height: clamp(280px, 40vh, 420px);
    }

    .swatch {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 1rem 0.75rem;
      cursor: pointer;
      position: relative;
      transition: flex 0.45s cubic-bezier(0.34, 1.56, 0.64, 1);
      overflow: hidden;
    }

    .swatch:hover {
      flex: 1.8;
    }

    .swatch-info {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.5rem;
      opacity: 0;
      transform: translateY(6px);
      transition: opacity 0.25s ease, transform 0.25s ease;
    }

    .swatch:hover .swatch-info {
      opacity: 1;
      transform: translateY(0);
    }

    .swatch-hex {
      font-family: 'Space Mono', monospace;
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      padding: 4px 8px;
      border-radius: 6px;
      background: rgba(0,0,0,0.25);
      backdrop-filter: blur(4px);
      color: #fff;
      white-space: nowrap;
    }

    .copy-btn {
      background: rgba(0,0,0,0.25);
      border: none;
      border-radius: 6px;
      color: #fff;
      cursor: pointer;
      padding: 4px 8px;
      font-size: 0.75rem;
      font-family: 'Inter', sans-serif;
      font-weight: 500;
      letter-spacing: 0.02em;
      transition: background 0.15s ease;
      white-space: nowrap;
    }

    .copy-btn:hover {
      background: rgba(0,0,0,0.45);
    }

    .copy-btn.copied {
      background: rgba(0,0,0,0.55);
    }

    .toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%) translateY(1rem);
      background: var(--text);
      color: var(--bg);
      padding: 0.6rem 1.2rem;
      border-radius: 999px;
      font-size: 0.85rem;
      font-weight: 500;
      opacity: 0;
      transition: opacity 0.2s ease, transform 0.2s ease;
      pointer-events: none;
      white-space: nowrap;
      z-index: 100;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .controls {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
    }

    .generate-btn {
      background: var(--btn-bg);
      color: var(--btn-text);
      border: none;
      border-radius: 999px;
      padding: 0.85rem 2.5rem;
      font-family: 'Inter', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: -0.01em;
      transition: transform 0.15s ease, background 0.15s ease;
      position: relative;
      overflow: hidden;
    }

    .generate-btn:hover {
      transform: scale(1.03);
    }

    .generate-btn:active {
      transform: scale(0.97);
    }

    .generate-btn .btn-inner {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .dice-icon {
      font-size: 1.1rem;
      display: inline-block;
      transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .generate-btn:hover .dice-icon {
      transform: rotate(90deg) scale(1.2);
    }

    .hint {
      font-size: 0.8rem;
      color: var(--muted);
      letter-spacing: 0.02em;
    }

    .mode-row {
      display: flex;
      gap: 0.5rem;
    }

    .mode-btn {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 999px;
      color: var(--muted);
      cursor: pointer;
      padding: 0.35rem 1rem;
      font-family: 'Inter', sans-serif;
      font-size: 0.8rem;
      font-weight: 500;
      transition: background 0.15s ease, color 0.15s ease, border-color 0.15s ease;
    }

    .mode-btn.active,
    .mode-btn:hover {
      background: var(--surface);
      color: var(--text);
      border-color: rgba(255,255,255,0.2);
    }

    @keyframes swatchFade {
      from { opacity: 0; transform: scaleY(0.92); }
      to   { opacity: 1; transform: scaleY(1); }
    }

    .palette.animating .swatch {
      animation: swatchFade 0.35s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    .palette.animating .swatch:nth-child(1) { animation-delay: 0ms; }
    .palette.animating .swatch:nth-child(2) { animation-delay: 40ms; }
    .palette.animating .swatch:nth-child(3) { animation-delay: 80ms; }
    .palette.animating .swatch:nth-child(4) { animation-delay: 120ms; }
    .palette.animating .swatch:nth-child(5) { animation-delay: 160ms; }

    footer {
      color: var(--muted);
      font-size: 0.75rem;
      letter-spacing: 0.02em;
    }
  </style>
</head>
<body>

<div id="gate">
  <div class="gate-box">
    <div>
      <p class="gate-title">Password required</p>
      <p class="gate-subtitle">Enter the password to access this page.</p>
    </div>
    <div class="gate-input-wrap">
      <input type="password" id="passwordInput" placeholder="Password" autocomplete="current-password" autofocus />
      <button class="toggle-visibility" id="toggleVis" aria-label="Show password">👁</button>
    </div>
    <p class="gate-error" id="gateError"></p>
    <button class="gate-submit" id="gateSubmit">Unlock</button>
  </div>
</div>

<header>
  <h1>Palette Drop</h1>
  <p>by Lucia Castello</p>
</header>

<div class="palette" id="palette"></div>

<div class="controls">
  <div class="mode-row" id="modeRow">
    <button class="mode-btn active" data-mode="any">Any</button>
    <button class="mode-btn" data-mode="pastel">Pastel</button>
    <button class="mode-btn" data-mode="vivid">Vivid</button>
    <button class="mode-btn" data-mode="dark">Dark</button>
    <button class="mode-btn" data-mode="earth">Earth</button>
  </div>
  <button class="generate-btn" id="generateBtn">
    <span class="btn-inner">
      <span class="dice-icon">⚄</span>
      Generate palette
    </span>
  </button>
  <span class="hint">Click a color to copy its hex code</span>
</div>

<footer>Hover to reveal · Click to copy</footer>

<div class="toast" id="toast"></div>

<script>
  const palette = document.getElementById('palette');
  const generateBtn = document.getElementById('generateBtn');
  const toast = document.getElementById('toast');
  const modeRow = document.getElementById('modeRow');

  let currentMode = 'any';
  let toastTimer;

  function rnd(min, max) {
    return Math.floor(Math.random() * (max - min + 1)) + min;
  }

  function hslToHex(h, s, l) {
    s /= 100; l /= 100;
    const a = s * Math.min(l, 1 - l);
    const f = n => {
      const k = (n + h / 30) % 12;
      const color = l - a * Math.max(Math.min(k - 3, 9 - k, 1), -1);
      return Math.round(255 * color).toString(16).padStart(2, '0');
    };
    return `#${f(0)}${f(8)}${f(4)}`.toUpperCase();
  }

  function randomColor(mode) {
    let h = rnd(0, 359);
    let s, l;
    switch (mode) {
      case 'pastel':  s = rnd(30, 55);  l = rnd(75, 90); break;
      case 'vivid':   s = rnd(75, 100); l = rnd(45, 60); break;
      case 'dark':    s = rnd(40, 80);  l = rnd(10, 30); break;
      case 'earth':
        h = [rnd(15,40), rnd(85,150), rnd(190,210)][rnd(0,2)];
        s = rnd(20, 50); l = rnd(25, 55); break;
      default:        s = rnd(25, 90);  l = rnd(30, 75); break;
    }
    return hslToHex(h, s, l);
  }

  function luminance(hex) {
    const r = parseInt(hex.slice(1,3), 16) / 255;
    const g = parseInt(hex.slice(3,5), 16) / 255;
    const b = parseInt(hex.slice(5,7), 16) / 255;
    return 0.2126 * r + 0.7152 * g + 0.0722 * b;
  }

  function textColor(hex) {
    return luminance(hex) > 0.4 ? 'rgba(0,0,0,0.75)' : 'rgba(255,255,255,0.9)';
  }

  function generatePalette() {
    const colors = Array.from({ length: 5 }, () => randomColor(currentMode));

    palette.classList.remove('animating');
    void palette.offsetWidth;
    palette.classList.add('animating');

    palette.innerHTML = '';
    colors.forEach(hex => {
      const swatch = document.createElement('div');
      swatch.className = 'swatch';
      swatch.style.background = hex;

      const tc = textColor(hex);
      swatch.innerHTML = `
        <div class="swatch-info">
          <span class="swatch-hex" style="background:rgba(0,0,0,0.3);color:#fff;">${hex}</span>
          <button class="copy-btn" aria-label="Copy ${hex}">Copy</button>
        </div>
      `;

      swatch.querySelector('.copy-btn').addEventListener('click', e => {
        e.stopPropagation();
        copyColor(hex, e.currentTarget);
      });

      swatch.addEventListener('click', () => copyColor(hex, null));
      palette.appendChild(swatch);
    });

    setTimeout(() => palette.classList.remove('animating'), 600);
  }

  function copyColor(hex, btn) {
    navigator.clipboard.writeText(hex).then(() => {
      if (btn) {
        btn.textContent = '✓ Copied';
        btn.classList.add('copied');
        setTimeout(() => {
          btn.textContent = 'Copy';
          btn.classList.remove('copied');
        }, 1500);
      }
      showToast(`${hex} copied`);
    });
  }

  function showToast(msg) {
    clearTimeout(toastTimer);
    toast.textContent = msg;
    toast.classList.add('show');
    toastTimer = setTimeout(() => toast.classList.remove('show'), 1800);
  }

  modeRow.addEventListener('click', e => {
    const btn = e.target.closest('.mode-btn');
    if (!btn) return;
    modeRow.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentMode = btn.dataset.mode;
    generatePalette();
  });

  generateBtn.addEventListener('click', generatePalette);
  generatePalette();

  const CORRECT = 'preview2026';
  const STORAGE_KEY = 'pd_auth';
  const gate = document.getElementById('gate');
  const input = document.getElementById('passwordInput');
  const errorEl = document.getElementById('gateError');
  const submitBtn = document.getElementById('gateSubmit');
  const toggleVis = document.getElementById('toggleVis');

  function unlock() {
    gate.classList.add('hidden');
  }

  if (localStorage.getItem(STORAGE_KEY) === '1') {
    unlock();
  }

  function attempt() {
    if (input.value === CORRECT) {
      localStorage.setItem(STORAGE_KEY, '1');
      input.classList.remove('error');
      errorEl.textContent = '';
      unlock();
    } else {
      input.classList.add('error');
      errorEl.textContent = 'Incorrect password — try again.';
      input.select();
    }
  }

  submitBtn.addEventListener('click', attempt);
  input.addEventListener('keydown', e => { if (e.key === 'Enter') attempt(); });
  input.addEventListener('input', () => {
    input.classList.remove('error');
    errorEl.textContent = '';
  });

  toggleVis.addEventListener('click', () => {
    const isPassword = input.type === 'password';
    input.type = isPassword ? 'text' : 'password';
    toggleVis.textContent = isPassword ? '🙈' : '👁';
    toggleVis.setAttribute('aria-label', isPassword ? 'Hide password' : 'Show password');
  });
</script>

</body>
</html>
